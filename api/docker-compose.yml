version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: settlemint
    ports:
      - "5432:5432"
    volumes:
      - settlemint_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  settlemint_pgdata:
