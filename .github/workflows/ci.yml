name: SettleMint CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Root Dependencies (if any)
      run: npm install || true

    - name: Install API Dependencies & Build
      working-directory: ./api
      run: |
        npm ci
        npm run build
      
    - name: Typecheck API
      working-directory: ./api
      run: npx tsc --noEmit

    - name: Install App Dependencies & Build
      working-directory: ./app
      run: |
        npm ci
        npm run build
